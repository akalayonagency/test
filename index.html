<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Générateur affiche Match Officiel</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Lobster&family=Montserrat:wght@800;900&display=swap");

:root{
  --poster-w:493px;
  --poster-h:700px;
  --main-font:"Lobster", cursive;
  --circle-font:"Montserrat", Arial, sans-serif;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  background:transparent;
  font-family:system-ui,Arial,sans-serif;
  color:white;
}

body{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
  padding:24px;
}

.panel{
  width:min(560px,95vw);
  background:rgba(0,0,0,.35);
  border-radius:16px;
  padding:16px;
}

h1{margin:0 0 16px;font-size:21px}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:12px;
}

label{font-size:12px;font-weight:800}

input,button{
  width:100%;
  padding:10px;
  border-radius:9px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);
  color:white;
  font-weight:700;
}

input[type=color]{height:42px;padding:4px}
input[type=range]{padding:0}

button{
  cursor:pointer;
  background:linear-gradient(#f8df7b,#c79a25);
  color:#1d1500;
  font-weight:1000;
}

button.secondary{
  background:rgba(0,0,0,.45);
  color:white;
}

button.isOff{opacity:.55}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.previewWrap{
  width:min(520px,95vw);
  display:flex;
  justify-content:center;
}

.poster{
  width:var(--poster-w);
  height:var(--poster-h);
  position:relative;
  overflow:hidden;
  background:#060606;
  box-shadow:0 22px 60px rgba(0,0,0,.55);
  user-select:none;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 48%,rgba(255,80,0,.18),transparent 38%),
    radial-gradient(circle at 50% 50%,transparent 30%,rgba(0,0,0,.72) 100%),
    linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.08),rgba(0,0,0,.52));
}

.draggable{
  position:absolute;
  z-index:5;
  cursor:grab;
  touch-action:none;
}

.draggable:active{cursor:grabbing}

.textImg{
  display:block;
  width:100%;
  pointer-events:none;
}

#titleBox{left:25px;top:25px;width:445px}
#dateBox{left:120px;top:150px;width:255px}
#timeBox{left:183px;top:197px;width:125px}
#vsBox{left:185px;top:455px;width:125px}
#boostBox{left:95px;top:600px;width:305px}

.bubble{
  width:126px;
  height:126px;
}

.bubbleInner{
  position:absolute;
  inset:18px;
  border-radius:50%;
  border:4px solid #d7a62a;
  overflow:hidden;
  background:#222;
  box-shadow:0 10px 25px rgba(0,0,0,.65);
}

.bubbleInner img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.circleText{
  position:absolute;
  inset:0;
  overflow:visible;
  pointer-events:none;
}

.circleText text{
  fill:#fff;
  font-family:var(--circle-font);
  font-size:13px;
  font-weight:900;
  letter-spacing:.5px;
  paint-order:stroke;
  stroke:#000;
  stroke-width:3px;
  stroke-linejoin:round;
  text-transform:uppercase;
}

#bubble1{left:45px;top:305px}
#bubble2{left:325px;top:475px}

#agencyBox{
  position:absolute;
  left:25px;
  top:620px;
  width:78px;
  height:78px;
  z-index:6;
  pointer-events:none;
}

#agencyBox img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  display:block;
}

.hiddenPosterElement{display:none!important}

.grain{
  position:absolute;
  inset:-20%;
  z-index:20;
  opacity:.11;
  pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.4) 1px,transparent 1px);
  background-size:6px 6px;
  mix-blend-mode:overlay;
}

.help{
  font-size:12px;
  opacity:.9;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="panel">
  <h1>🥊 Générateur affiche Match Officiel</h1>

  <div class="field">
    <label>Image de fond</label>
    <input id="bgInput" type="file" accept="image/*">
  </div>

  <div class="row">
    <div class="field">
      <label>Logo / avatar créa 1</label>
      <input id="avatar1Input" type="file" accept="image/*">
    </div>
    <div class="field">
      <label>Logo / avatar créa 2</label>
      <input id="avatar2Input" type="file" accept="image/*">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Texte bulle créa 1</label>
      <input id="handle1Text" value="@créa 1">
    </div>
    <div class="field">
      <label>Texte bulle créa 2</label>
      <input id="handle2Text" value="@créa 2">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Taille rond créa 1</label>
      <input id="bubble1Size" type="range" min="80" max="190" value="126">
    </div>
    <div class="field">
      <label>Taille rond créa 2</label>
      <input id="bubble2Size" type="range" min="80" max="190" value="126">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Rotation texte créa 1</label>
      <input id="bubble1Angle" type="range" min="0" max="360" value="110">
    </div>
    <div class="field">
      <label>Rotation texte créa 2</label>
      <input id="bubble2Angle" type="range" min="0" max="360" value="110">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Couleur texte</label>
      <input id="mainColor" type="color" value="#ffffff">
    </div>
    <div class="field">
      <label>Couleur VS</label>
      <input id="vsColor" type="color" value="#ff4b00">
    </div>
  </div>

  <div class="btns">
    <button id="toggleTitleBtn">Titre : ON</button>
    <button id="toggleDateBtn">Date : ON</button>
    <button id="toggleTimeBtn">Heure : ON</button>
    <button id="toggleVsBtn">VS : ON</button>
    <button id="toggleBubblesBtn">Bulles : ON</button>
    <button id="boostToggleBtn">Sans Boost</button>
  </div>

  <div class="btns">
    <button id="downloadBtn">Télécharger PNG</button>
    <button id="resetBtn" class="secondary">Réinitialiser positions</button>
  </div>

  <div class="help">
    Le logo fixe doit s’appeler <strong>agency.png</strong> et être dans le même dossier que ce fichier HTML.
  </div>
</div>

<div class="previewWrap">
  <div class="poster" id="poster">
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div id="titleBox" class="draggable"><img id="titleImg" class="textImg"></div>
    <div id="dateBox" class="draggable"><img id="dateImg" class="textImg"></div>
    <div id="timeBox" class="draggable"><img id="timeImg" class="textImg"></div>
    <div id="vsBox" class="draggable"><img id="vsImg" class="textImg"></div>
    <div id="boostBox" class="draggable"><img id="boostImg" class="textImg"></div>

    <div id="bubble1" class="bubble draggable">
      <svg class="circleText" viewBox="0 0 126 126">
        <defs>
          <path id="circlePath1" d="M63,63 m-49,0 a49,49 0 1,1 98,0 a49,49 0 1,1 -98,0"></path>
        </defs>
        <text>
          <textPath id="circleText1" href="#circlePath1" startOffset="50%" text-anchor="middle">@créa 1</textPath>
        </text>
      </svg>
      <div class="bubbleInner"><img id="avatar1Img"></div>
    </div>

    <div id="bubble2" class="bubble draggable">
      <svg class="circleText" viewBox="0 0 126 126">
        <defs>
          <path id="circlePath2" d="M63,63 m-49,0 a49,49 0 1,1 98,0 a49,49 0 1,1 -98,0"></path>
        </defs>
        <text>
          <textPath id="circleText2" href="#circlePath2" startOffset="50%" text-anchor="middle">@créa 2</textPath>
        </text>
      </svg>
      <div class="bubbleInner"><img id="avatar2Img"></div>
    </div>

    <div id="agencyBox">
      <img id="agencyImg" src="agency.png" alt="Logo organisation" crossorigin="anonymous">
    </div>

    <div class="grain"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const $ = id => document.getElementById(id);

const state = {
  boost:false,
  showTitle:true,
  showDate:true,
  showTime:true,
  showVs:true,
  showBubbles:true
};

const defaultPositions = {
  titleBox:{x:25,y:25},
  dateBox:{x:120,y:150},
  timeBox:{x:183,y:197},
  vsBox:{x:185,y:455},
  boostBox:{x:95,y:600},
  bubble1:{x:45,y:305},
  bubble2:{x:325,y:475}
};

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadFile(input,callback){
  const file = input.files && input.files[0];
  if(!file) return;
  const url = await fileToDataURL(file);
  callback(url);
}

function renderTextToImg(img,{
  text,
  maxWidth,
  startSize,
  minSize,
  color="#fff",
  strokeColor="#000",
  strokeWidth=8,
  shadowColor="rgba(0,0,0,.8)",
  shadowBlur=8,
  shadowY=5,
  padX=30,
  padY=22,
  gradient=false,
  g1="#fff",
  g2="#ddd"
}){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const dpr = Math.max(2, window.devicePixelRatio || 2);
  const fontFamily = getComputedStyle(document.documentElement).getPropertyValue("--main-font").trim();

  let size = startSize;

  function setFont(){
    ctx.font = `900 ${size}px ${fontFamily}`;
  }

  function measure(){
    setFont();
    return ctx.measureText(text).width;
  }

  let textW = measure();

  while(textW > maxWidth - padX * 2 && size > minSize){
    size -= 2;
    textW = measure();
  }

  const textH = size * 1.35;

  canvas.width = Math.ceil((textW + padX * 2) * dpr);
  canvas.height = Math.ceil((textH + padY * 2) * dpr);

  ctx.scale(dpr,dpr);
  setFont();

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineJoin = "round";
  ctx.miterLimit = 2;

  const cx = (textW + padX * 2) / 2;
  const cy = (textH + padY * 2) / 2;

  let fill = color;

  if(gradient){
    const grad = ctx.createLinearGradient(0,0,textW + padX * 2,0);
    grad.addColorStop(0,g1);
    grad.addColorStop(.5,color);
    grad.addColorStop(1,g2);
    fill = grad;
  }

  ctx.shadowColor = "transparent";
  ctx.lineWidth = strokeWidth;
  ctx.strokeStyle = strokeColor;
  ctx.strokeText(text,cx,cy);

  ctx.fillStyle = fill;
  ctx.shadowColor = shadowColor;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetY = shadowY;
  ctx.fillText(text,cx,cy);

  img.src = canvas.toDataURL("image/png");
  img.style.width = "100%";
}

async function renderAll(){
  if(document.fonts && document.fonts.ready){
    await document.fonts.ready;
  }

  const mainColor = $("mainColor").value;
  const vsColor = $("vsColor").value;

  renderTextToImg($("titleImg"),{
    text:"Match officiel",
    maxWidth:445,
    startSize:82,
    minSize:34,
    color:mainColor,
    strokeWidth:10,
    padX:34
  });

  renderTextToImg($("dateImg"),{
    text:"Jeudi 09 Avril",
    maxWidth:255,
    startSize:44,
    minSize:24,
    color:mainColor,
    strokeWidth:7
  });

  renderTextToImg($("timeImg"),{
    text:"21 h 30",
    maxWidth:125,
    startSize:44,
    minSize:22,
    color:mainColor,
    strokeWidth:7
  });

  renderTextToImg($("vsImg"),{
    text:"VS",
    maxWidth:125,
    startSize:76,
    minSize:38,
    color:vsColor,
    strokeColor:"#000",
    strokeWidth:8,
    shadowColor:"rgba(255,90,0,.9)",
    shadowBlur:14,
    shadowY:0,
    gradient:true,
    g1:"#fff000",
    g2:"#ff2400",
    padX:18,
    padY:18
  });

  renderTextToImg($("boostImg"),{
    text:state.boost ? "avec boost" : "sans boost",
    maxWidth:305,
    startSize:58,
    minSize:28,
    color:mainColor,
    strokeWidth:8,
    padX:24
  });

  $("circleText1").textContent = $("handle1Text").value || "@créa 1";
  $("circleText2").textContent = $("handle2Text").value || "@créa 2";

  applyBubbleControls();
  applyVisibility();
  saveSettings();
}

function applyBubbleControls(){
  const size1 = Number($("bubble1Size").value);
  const size2 = Number($("bubble2Size").value);
  const angle1 = Number($("bubble1Angle").value);
  const angle2 = Number($("bubble2Angle").value);

  setBubbleSize("bubble1",size1);
  setBubbleSize("bubble2",size2);

  $("circleText1").setAttribute("startOffset", angle1 / 360 * 100 + "%");
  $("circleText2").setAttribute("startOffset", angle2 / 360 * 100 + "%");
}

function setBubbleSize(id,size){
  const el = $(id);
  const svg = el.querySelector("svg");
  const inner = el.querySelector(".bubbleInner");
  const path = el.querySelector("path");

  el.style.width = size + "px";
  el.style.height = size + "px";

  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);

  const cx = size / 2;
  const r = size * .39;

  path.setAttribute(
    "d",
    `M${cx},${cx} m-${r},0 a${r},${r} 0 1,1 ${r*2},0 a${r},${r} 0 1,1 -${r*2},0`
  );

  inner.style.inset = Math.round(size * .14) + "px";
}

function applyVisibility(){
  $("titleBox").classList.toggle("hiddenPosterElement",!state.showTitle);
  $("dateBox").classList.toggle("hiddenPosterElement",!state.showDate);
  $("timeBox").classList.toggle("hiddenPosterElement",!state.showTime);
  $("vsBox").classList.toggle("hiddenPosterElement",!state.showVs);
  $("bubble1").classList.toggle("hiddenPosterElement",!state.showBubbles);
  $("bubble2").classList.toggle("hiddenPosterElement",!state.showBubbles);

  updateToggleButton("toggleTitleBtn","Titre",state.showTitle);
  updateToggleButton("toggleDateBtn","Date",state.showDate);
  updateToggleButton("toggleTimeBtn","Heure",state.showTime);
  updateToggleButton("toggleVsBtn","VS",state.showVs);
  updateToggleButton("toggleBubblesBtn","Bulles",state.showBubbles);

  $("boostToggleBtn").textContent = state.boost ? "Avec Boost" : "Sans Boost";
}

function updateToggleButton(id,label,on){
  const btn = $(id);
  btn.textContent = `${label} : ${on ? "ON" : "OFF"}`;
  btn.classList.toggle("isOff",!on);
}

function savePositions(){
  const data = {};
  document.querySelectorAll(".draggable").forEach(el=>{
    data[el.id] = {
      x:parseFloat(el.style.left) || el.offsetLeft,
      y:parseFloat(el.style.top) || el.offsetTop
    };
  });
  localStorage.setItem("matchPosterPositions",JSON.stringify(data));
}

function restorePositions(){
  let data = defaultPositions;

  try{
    data = {
      ...defaultPositions,
      ...(JSON.parse(localStorage.getItem("matchPosterPositions") || "{}"))
    };
  }catch(e){}

  Object.entries(data).forEach(([id,pos])=>{
    const el = $(id);
    if(!el) return;
    el.style.left = pos.x + "px";
    el.style.top = pos.y + "px";
  });
}

function saveSettings(){
  const data = {
    handle1:$("handle1Text").value,
    handle2:$("handle2Text").value,
    mainColor:$("mainColor").value,
    vsColor:$("vsColor").value,
    bubble1Size:$("bubble1Size").value,
    bubble2Size:$("bubble2Size").value,
    bubble1Angle:$("bubble1Angle").value,
    bubble2Angle:$("bubble2Angle").value,
    state
  };

  localStorage.setItem("matchPosterSettings",JSON.stringify(data));
}

function restoreSettings(){
  try{
    const data = JSON.parse(localStorage.getItem("matchPosterSettings") || "{}");

    if(data.handle1) $("handle1Text").value = data.handle1;
    if(data.handle2) $("handle2Text").value = data.handle2;
    if(data.mainColor) $("mainColor").value = data.mainColor;
    if(data.vsColor) $("vsColor").value = data.vsColor;
    if(data.bubble1Size) $("bubble1Size").value = data.bubble1Size;
    if(data.bubble2Size) $("bubble2Size").value = data.bubble2Size;
    if(data.bubble1Angle) $("bubble1Angle").value = data.bubble1Angle;
    if(data.bubble2Angle) $("bubble2Angle").value = data.bubble2Angle;

    if(data.state){
      Object.assign(state,data.state);
    }
  }catch(e){}
}

function makeDraggable(el){
  let startX = 0;
  let startY = 0;
  let baseX = 0;
  let baseY = 0;

  el.addEventListener("pointerdown",e=>{
    e.preventDefault();
    el.setPointerCapture(e.pointerId);

    startX = e.clientX;
    startY = e.clientY;
    baseX = parseFloat(el.style.left) || el.offsetLeft;
    baseY = parseFloat(el.style.top) || el.offsetTop;

    el.style.zIndex = 30;
  });

  el.addEventListener("pointermove",e=>{
    if(!el.hasPointerCapture(e.pointerId)) return;

    const poster = $("poster");
    const rect = poster.getBoundingClientRect();
    const scaleX = 493 / rect.width;
    const scaleY = 700 / rect.height;

    let x = baseX + (e.clientX - startX) * scaleX;
    let y = baseY + (e.clientY - startY) * scaleY;

    x = Math.max(-120,Math.min(493 - 20,x));
    y = Math.max(-120,Math.min(700 - 20,y));

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  el.addEventListener("pointerup",e=>{
    if(el.hasPointerCapture(e.pointerId)){
      el.releasePointerCapture(e.pointerId);
    }

    el.style.zIndex = "";
    savePositions();
  });
}

async function waitForImages(container){
  const images = Array.from(container.querySelectorAll("img"));

  await Promise.all(images.map(img=>{
    if(!img.src) return Promise.resolve();

    if(img.complete && img.naturalWidth > 0){
      return Promise.resolve();
    }

    return new Promise(resolve=>{
      img.addEventListener("load",resolve,{once:true});
      img.addEventListener("error",resolve,{once:true});
    });
  }));
}

$("bgInput").addEventListener("change",()=>{
  loadFile($("bgInput"),url=>{
    $("bg").style.backgroundImage = `url("${url}")`;
  });
});

$("avatar1Input").addEventListener("change",()=>{
  loadFile($("avatar1Input"),url=>{
    $("avatar1Img").src = url;
  });
});

$("avatar2Input").addEventListener("change",()=>{
  loadFile($("avatar2Input"),url=>{
    $("avatar2Img").src = url;
  });
});

[
  "handle1Text",
  "handle2Text",
  "mainColor",
  "vsColor",
  "bubble1Size",
  "bubble2Size",
  "bubble1Angle",
  "bubble2Angle"
].forEach(id=>{
  $(id).addEventListener("input",renderAll);
});

$("toggleTitleBtn").addEventListener("click",()=>{
  state.showTitle = !state.showTitle;
  renderAll();
});

$("toggleDateBtn").addEventListener("click",()=>{
  state.showDate = !state.showDate;
  renderAll();
});

$("toggleTimeBtn").addEventListener("click",()=>{
  state.showTime = !state.showTime;
  renderAll();
});

$("toggleVsBtn").addEventListener("click",()=>{
  state.showVs = !state.showVs;
  renderAll();
});

$("toggleBubblesBtn").addEventListener("click",()=>{
  state.showBubbles = !state.showBubbles;
  renderAll();
});

$("boostToggleBtn").addEventListener("click",()=>{
  state.boost = !state.boost;
  renderAll();
});

$("downloadBtn").addEventListener("click",async()=>{
  try{
    const poster = $("poster");

    await renderAll();

    if(document.fonts && document.fonts.ready){
      await document.fonts.ready;
    }

    await waitForImages(poster);

    const canvas = await html2canvas(poster,{
      backgroundColor:null,
      useCORS:true,
      allowTaint:true,
      scale:3,
      width:493,
      height:700,
      windowWidth:document.documentElement.clientWidth,
      windowHeight:document.documentElement.clientHeight
    });

    const dataURL = canvas.toDataURL("image/png");

    const a = document.createElement("a");
    a.href = dataURL;
    a.download = "affiche-match-officiel.png";
    document.body.appendChild(a);
    a.click();
    a.remove();

  }catch(err){
    console.error(err);
    alert("Erreur export PNG. Vérifie que agency.png est bien dans le même dossier que ton fichier HTML.");
  }
});

$("resetBtn").addEventListener("click",()=>{
  localStorage.removeItem("matchPosterPositions");
  restorePositions();
});

document.querySelectorAll(".draggable").forEach(makeDraggable);

restoreSettings();
restorePositions();
renderAll();
</script>

</body>
</html>
