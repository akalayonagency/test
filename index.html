<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Générateur affiche Match Officiel</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lobster&family=Pacifico&family=Alex+Brush&family=Anton&display=swap");

:root{
  --poster-w:493px;
  --poster-h:700px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  background:transparent;
  font-family:system-ui,Arial,sans-serif;
  color:white;
}

body{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
  padding:24px;
}

.panel{
  width:min(560px,95vw);
  background:rgba(0,0,0,.35);
  border-radius:16px;
  padding:16px;
}

h1{
  margin:0 0 16px;
  font-size:21px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:12px;
}

label{
  font-size:12px;
  font-weight:800;
}

input,select,button{
  width:100%;
  padding:10px;
  border-radius:9px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);
  color:white;
  font-weight:700;
}

input[type=color]{
  height:42px;
  padding:4px;
}

button{
  cursor:pointer;
  background:linear-gradient(#f8df7b,#c79a25);
  color:#1d1500;
  font-weight:1000;
}

button.secondary{
  background:rgba(0,0,0,.45);
  color:white;
}

.previewWrap{
  width:min(520px,95vw);
  display:flex;
  justify-content:center;
}

.poster{
  width:var(--poster-w);
  height:var(--poster-h);
  position:relative;
  overflow:hidden;
  background:#080808;
  box-shadow:0 22px 60px rgba(0,0,0,.55);
  user-select:none;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 45%,rgba(255,80,0,.18),transparent 40%),
    radial-gradient(circle at 50% 50%,transparent 30%,rgba(0,0,0,.65) 100%),
    linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.08),rgba(0,0,0,.48));
}

.draggable{
  position:absolute;
  z-index:5;
  cursor:grab;
  touch-action:none;
}

.draggable:active{
  cursor:grabbing;
}

.textImg{
  display:block;
  pointer-events:none;
}

#titleBox{left:25px;top:25px;width:445px}
#dateBox{left:120px;top:150px;width:255px}
#timeBox{left:183px;top:197px;width:125px}
#vsBox{left:202px;top:455px;width:90px}
#boostBox{left:95px;top:600px;width:305px}

.bubble{
  width:126px;
  height:126px;
}

.bubbleInner{
  position:absolute;
  inset:18px;
  border-radius:50%;
  border:4px solid #d7a62a;
  overflow:hidden;
  background:#222;
  box-shadow:0 10px 25px rgba(0,0,0,.65);
}

.bubbleInner img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.circleText{
  position:absolute;
  inset:0;
  overflow:visible;
  pointer-events:none;
}

.circleText text{
  fill:#fff;
  font-family:Impact,Arial Black,sans-serif;
  font-size:15px;
  font-weight:900;
  letter-spacing:.8px;
  paint-order:stroke;
  stroke:#000;
  stroke-width:4px;
  stroke-linejoin:round;
}

#bubble1{left:45px;top:305px}
#bubble2{left:325px;top:475px}
#agencyBox{left:25px;top:620px;width:78px;height:78px}

#agencyBox img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.grain{
  position:absolute;
  inset:-20%;
  z-index:20;
  opacity:.11;
  pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.4) 1px,transparent 1px);
  background-size:6px 6px;
  mix-blend-mode:overlay;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.help{
  font-size:12px;
  opacity:.9;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="panel">
  <h1>🥊 Générateur affiche Match Officiel</h1>

  <div class="field">
    <label>Image de fond</label>
    <input id="bgInput" type="file" accept="image/*">
  </div>

  <div class="row">
    <div class="field">
      <label>Logo / avatar créa 1</label>
      <input id="avatar1Input" type="file" accept="image/*">
    </div>
    <div class="field">
      <label>Logo / avatar créa 2</label>
      <input id="avatar2Input" type="file" accept="image/*">
    </div>
  </div>

  <div class="field">
    <label>Logo organisation bas gauche</label>
    <input id="agencyInput" type="file" accept="image/*">
  </div>

  <div class="row">
    <div class="field">
      <label>Titre</label>
      <input id="titleText" value="Match officiel">
    </div>
    <div class="field">
      <label>Texte boost</label>
      <input id="boostText" value="sans boost">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Date</label>
      <input id="dateText" value="Jeudi 09 Avril">
    </div>
    <div class="field">
      <label>Heure</label>
      <input id="timeText" value="21 h 30">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Texte bulle 1</label>
      <input id="handle1Text" value="@pierrotlefouuuu">
    </div>
    <div class="field">
      <label>Texte bulle 2</label>
      <input id="handle2Text" value="@www.rafiki.com">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Couleur texte</label>
      <input id="mainColor" type="color" value="#ffffff">
    </div>
    <div class="field">
      <label>Couleur VS</label>
      <input id="vsColor" type="color" value="#ff4b00">
    </div>
  </div>

  <div class="field">
    <label>Police titre / date / heure</label>
    <select id="fontSelect">
      <option value='"Great Vibes", cursive'>Great Vibes</option>
      <option value='"Lobster", cursive" selected>Lobster</option>
      <option value='"Pacifico", cursive'>Pacifico</option>
      <option value='"Alex Brush", cursive'>Alex Brush</option>
      <option value='"Anton", sans-serif'>Anton</option>
      <option value='Impact, sans-serif'>Impact</option>
      <option value='Georgia, serif'>Georgia</option>
    </select>
  </div>

  <div class="btns">
    <button id="downloadBtn">Télécharger PNG</button>
    <button id="resetBtn" class="secondary">Réinitialiser positions</button>
  </div>

  <div class="help">
    Astuce : tu peux déplacer le titre, la date, l’heure, VS, les bulles et le logo en glissant avec la souris.
  </div>
</div>

<div class="previewWrap">
  <div class="poster" id="poster">
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div id="titleBox" class="draggable"><img id="titleImg" class="textImg"></div>
    <div id="dateBox" class="draggable"><img id="dateImg" class="textImg"></div>
    <div id="timeBox" class="draggable"><img id="timeImg" class="textImg"></div>
    <div id="vsBox" class="draggable"><img id="vsImg" class="textImg"></div>
    <div id="boostBox" class="draggable"><img id="boostImg" class="textImg"></div>

    <div id="bubble1" class="bubble draggable">
      <svg class="circleText" viewBox="0 0 126 126">
        <defs>
          <path id="circlePath1" d="M63,63 m-49,0 a49,49 0 1,1 98,0 a49,49 0 1,1 -98,0"></path>
        </defs>
        <text>
          <textPath id="circleText1" href="#circlePath1" startOffset="63%" text-anchor="middle">@pierrotlefouuuu</textPath>
        </text>
      </svg>
      <div class="bubbleInner"><img id="avatar1Img"></div>
    </div>

    <div id="bubble2" class="bubble draggable">
      <svg class="circleText" viewBox="0 0 126 126">
        <defs>
          <path id="circlePath2" d="M63,63 m-49,0 a49,49 0 1,1 98,0 a49,49 0 1,1 -98,0"></path>
        </defs>
        <text>
          <textPath id="circleText2" href="#circlePath2" startOffset="63%" text-anchor="middle">@www.rafiki.com</textPath>
        </text>
      </svg>
      <div class="bubbleInner"><img id="avatar2Img"></div>
    </div>

    <div id="agencyBox" class="draggable">
      <img id="agencyImg">
    </div>

    <div class="grain"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const $ = id => document.getElementById(id);

const inputs = {
  bg: $("bgInput"),
  avatar1: $("avatar1Input"),
  avatar2: $("avatar2Input"),
  agency: $("agencyInput"),
  title: $("titleText"),
  date: $("dateText"),
  time: $("timeText"),
  boost: $("boostText"),
  handle1: $("handle1Text"),
  handle2: $("handle2Text"),
  mainColor: $("mainColor"),
  vsColor: $("vsColor"),
  font: $("fontSelect")
};

const imgs = {
  title: $("titleImg"),
  date: $("dateImg"),
  time: $("timeImg"),
  vs: $("vsImg"),
  boost: $("boostImg"),
  avatar1: $("avatar1Img"),
  avatar2: $("avatar2Img"),
  agency: $("agencyImg")
};

const defaultPositions = {
  titleBox:{x:25,y:25},
  dateBox:{x:120,y:150},
  timeBox:{x:183,y:197},
  vsBox:{x:202,y:455},
  boostBox:{x:95,y:600},
  bubble1:{x:45,y:305},
  bubble2:{x:325,y:475},
  agencyBox:{x:25,y:620}
};

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function clampText(text,max){
  text = String(text || "").trim();
  if(text.length <= max) return text;
  return text.slice(0,max - 1) + "…";
}

function renderTextToImg(img,{
  text,
  fontFamily,
  maxWidth,
  startSize,
  minSize,
  color,
  strokeColor="#000",
  strokeWidth=8,
  weight=900,
  italic=false,
  shadowColor="rgba(0,0,0,.75)",
  shadowBlur=8,
  shadowY=5,
  padX=28,
  padY=22,
  letterSpacing=0,
  gradient=false,
  g1="#fff",
  g2="#ddd"
}){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const dpr = Math.max(2, window.devicePixelRatio || 2);

  text = text || "";

  let size = startSize;

  function setFont(){
    ctx.font = `${italic ? "italic" : "normal"} ${weight} ${size}px ${fontFamily}`;
  }

  function measure(){
    setFont();
    const chars = [...text];
    let w = 0;
    chars.forEach((ch,i)=>{
      w += ctx.measureText(ch).width;
      if(i < chars.length - 1) w += letterSpacing;
    });
    return w;
  }

  let textW = measure();

  while(textW > maxWidth - padX * 2 && size > minSize){
    size -= 2;
    textW = measure();
  }

  const textH = size * 1.35;
  const w = Math.ceil((textW + padX * 2) * dpr);
  const h = Math.ceil((textH + padY * 2) * dpr);

  canvas.width = w;
  canvas.height = h;

  ctx.scale(dpr,dpr);
  setFont();
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineJoin = "round";
  ctx.miterLimit = 2;

  const cx = (textW + padX * 2) / 2;
  const cy = (textH + padY * 2) / 2;

  let fill = color;

  if(gradient){
    const grad = ctx.createLinearGradient(0,0,textW + padX * 2,0);
    grad.addColorStop(0,g1);
    grad.addColorStop(.45,color);
    grad.addColorStop(1,g2);
    fill = grad;
  }

  const chars = [...text];

  function draw(mode){
    let x = cx - textW / 2;
    chars.forEach((ch,i)=>{
      const cw = ctx.measureText(ch).width;
      const mid = x + cw / 2;
      if(mode === "stroke") ctx.strokeText(ch,mid,cy);
      else ctx.fillText(ch,mid,cy);
      x += cw + letterSpacing;
    });
  }

  ctx.shadowColor = "transparent";
  ctx.lineWidth = strokeWidth;
  ctx.strokeStyle = strokeColor;
  draw("stroke");

  ctx.fillStyle = fill;
  ctx.shadowColor = shadowColor;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetY = shadowY;
  draw("fill");

  img.src = canvas.toDataURL("image/png");
  img.style.width = "100%";
}

async function renderAll(){
  if(document.fonts && document.fonts.ready) await document.fonts.ready;

  const font = inputs.font.value;
  const color = inputs.mainColor.value;

  renderTextToImg(imgs.title,{
    text:clampText(inputs.title.value,28),
    fontFamily:font,
    maxWidth:445,
    startSize:82,
    minSize:34,
    color,
    strokeWidth:10,
    padX:34
  });

  renderTextToImg(imgs.date,{
    text:clampText(inputs.date.value,28),
    fontFamily:font,
    maxWidth:255,
    startSize:44,
    minSize:24,
    color,
    strokeWidth:7
  });

  renderTextToImg(imgs.time,{
    text:clampText(inputs.time.value,16),
    fontFamily:font,
    maxWidth:125,
    startSize:44,
    minSize:22,
    color,
    strokeWidth:7
  });

  renderTextToImg(imgs.vs,{
    text:"VS",
    fontFamily:"Impact, sans-serif",
    maxWidth:90,
    startSize:64,
    minSize:40,
    color:inputs.vsColor.value,
    strokeColor:"#8b1600",
    strokeWidth:4,
    italic:true,
    shadowColor:"rgba(255,90,0,.9)",
    shadowBlur:12,
    shadowY:0,
    gradient:true,
    g1:"#fff000",
    g2:"#ff2400",
    padX:12,
    padY:12
  });

  renderTextToImg(imgs.boost,{
    text:clampText(inputs.boost.value,24),
    fontFamily:"Georgia, serif",
    maxWidth:305,
    startSize:58,
    minSize:28,
    color,
    strokeWidth:8,
    padX:24
  });

  $("circleText1").textContent = clampText(inputs.handle1.value,24);
  $("circleText2").textContent = clampText(inputs.handle2.value,24);
}

function saveText(){
  const data = {
    title:inputs.title.value,
    date:inputs.date.value,
    time:inputs.time.value,
    boost:inputs.boost.value,
    handle1:inputs.handle1.value,
    handle2:inputs.handle2.value,
    mainColor:inputs.mainColor.value,
    vsColor:inputs.vsColor.value,
    font:inputs.font.value
  };
  localStorage.setItem("matchPosterText",JSON.stringify(data));
}

function restoreText(){
  try{
    const data = JSON.parse(localStorage.getItem("matchPosterText") || "{}");
    if(data.title) inputs.title.value = data.title;
    if(data.date) inputs.date.value = data.date;
    if(data.time) inputs.time.value = data.time;
    if(data.boost) inputs.boost.value = data.boost;
    if(data.handle1) inputs.handle1.value = data.handle1;
    if(data.handle2) inputs.handle2.value = data.handle2;
    if(data.mainColor) inputs.mainColor.value = data.mainColor;
    if(data.vsColor) inputs.vsColor.value = data.vsColor;
    if(data.font) inputs.font.value = data.font;
  }catch(e){}
}

function savePositions(){
  const data = {};
  document.querySelectorAll(".draggable").forEach(el=>{
    data[el.id] = {
      x:parseFloat(el.style.left) || el.offsetLeft,
      y:parseFloat(el.style.top) || el.offsetTop
    };
  });
  localStorage.setItem("matchPosterPositions",JSON.stringify(data));
}

function restorePositions(){
  let data = defaultPositions;
  try{
    data = {
      ...defaultPositions,
      ...(JSON.parse(localStorage.getItem("matchPosterPositions") || "{}"))
    };
  }catch(e){}

  Object.entries(data).forEach(([id,pos])=>{
    const el = $(id);
    if(!el) return;
    el.style.left = pos.x + "px";
    el.style.top = pos.y + "px";
  });
}

function makeDraggable(el){
  let startX = 0;
  let startY = 0;
  let baseX = 0;
  let baseY = 0;

  el.addEventListener("pointerdown",e=>{
    e.preventDefault();
    el.setPointerCapture(e.pointerId);

    startX = e.clientX;
    startY = e.clientY;
    baseX = parseFloat(el.style.left) || el.offsetLeft;
    baseY = parseFloat(el.style.top) || el.offsetTop;

    el.style.zIndex = 30;
  });

  el.addEventListener("pointermove",e=>{
    if(!el.hasPointerCapture(e.pointerId)) return;

    const poster = $("poster");
    const rect = poster.getBoundingClientRect();
    const scaleX = 493 / rect.width;
    const scaleY = 700 / rect.height;

    let x = baseX + (e.clientX - startX) * scaleX;
    let y = baseY + (e.clientY - startY) * scaleY;

    x = Math.max(-80,Math.min(493 - 20,x));
    y = Math.max(-80,Math.min(700 - 20,y));

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  el.addEventListener("pointerup",e=>{
    if(el.hasPointerCapture(e.pointerId)){
      el.releasePointerCapture(e.pointerId);
    }
    el.style.zIndex = "";
    savePositions();
  });
}

async function loadFile(input,callback){
  const file = input.files && input.files[0];
  if(!file) return;
  const url = await fileToDataURL(file);
  callback(url);
}

inputs.bg.addEventListener("change",()=>{
  loadFile(inputs.bg,url=>{
    $("bg").style.backgroundImage = `url("${url}")`;
  });
});

inputs.avatar1.addEventListener("change",()=>{
  loadFile(inputs.avatar1,url=>imgs.avatar1.src = url);
});

inputs.avatar2.addEventListener("change",()=>{
  loadFile(inputs.avatar2,url=>imgs.avatar2.src = url);
});

inputs.agency.addEventListener("change",()=>{
  loadFile(inputs.agency,url=>imgs.agency.src = url);
});

[
  inputs.title,
  inputs.date,
  inputs.time,
  inputs.boost,
  inputs.handle1,
  inputs.handle2,
  inputs.mainColor,
  inputs.vsColor,
  inputs.font
].forEach(el=>{
  el.addEventListener("input",async()=>{
    await renderAll();
    saveText();
  });
  el.addEventListener("change",async()=>{
    await renderAll();
    saveText();
  });
});

async function waitForImages(container){
  const images = Array.from(container.querySelectorAll("img"));
  await Promise.all(images.map(img=>{
    if(!img.src) return Promise.resolve();
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(resolve=>{
      img.addEventListener("load",resolve,{once:true});
      img.addEventListener("error",resolve,{once:true});
    });
  }));
}

$("downloadBtn").addEventListener("click",async()=>{
  const poster = $("poster");
  await renderAll();

  if(document.fonts && document.fonts.ready) await document.fonts.ready;
  await waitForImages(poster);

  const canvas = await html2canvas(poster,{
    backgroundColor:null,
    useCORS:true,
    scale:3,
    width:493,
    height:700
  });

  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = "affiche-match-officiel.png";
  a.click();
});

$("resetBtn").addEventListener("click",()=>{
  localStorage.removeItem("matchPosterPositions");
  restorePositions();
});

document.querySelectorAll(".draggable").forEach(makeDraggable);

restoreText();
restorePositions();
renderAll();
</script>

</body>
</html>
